# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push docker img
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/expensemanagementapp-email_service:latest \
            --push .

  deploy:
      needs: build
      runs-on: ubuntu-latest
      if: github.event_name == 'push'
  
      steps:
        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v2
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ secrets.AWS_REGION }}
        #ssm to ec2 instance
        - name: Deploy to Backend-1
          run: |
            aws ssm send-command \
              --instance-ids ${{ secrets.EC2_BACKEND_1_INSTANCE_ID }} \
              --document-name "AWS-RunShellScript" \
              --parameters commands=["cd /home/ssm-user/expensphie && docker-compose -f docker-compose.backend.yml pull && docker-compose -f docker-compose.backend.yml up -d --no-deps email_service"]
  
        - name: Wait for Backend-1
          run: sleep 30
  
        - name: Deploy to Backend-2
          run: |
            aws ssm send-command \
              --instance-ids ${{ secrets.EC2_BACKEND_2_INSTANCE_ID }} \
              --document-name "AWS-RunShellScript" \
              --parameters commands=["cd /home/ssm-user/expensphie && docker-compose -f docker-compose.backend.yml pull && docker-compose -f docker-compose.backend.yml up -d --no-deps email_service"]
