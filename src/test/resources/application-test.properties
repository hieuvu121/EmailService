# Prevent external dependencies from being required during tests

# --- Mail: use harmless defaults ---
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.from=test@example.com

# --- DB: use in-memory DB for tests (recommended) ---
spring.datasource.url=jdbc:h2:mem:email_service;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop

# (Optional) Kafka: don?t try to connect in tests
spring.kafka.bootstrap-servers=localhost:9092